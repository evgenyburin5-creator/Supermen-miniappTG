<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Супермен</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#87ceeb;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
#wrap{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;}
canvas{display:block;-ms-touch-action:none;touch-action:none;}
#err{display:none;position:fixed;top:10px;left:10px;right:10px;padding:12px;background:rgba(255,0,0,0.9);color:#fff;border-radius:8px;font-size:12px;z-index:1000;word-break:break-all;}
#overlay{display:none;position:absolute;top:50%;left:50%;-webkit-transform:translate(-50%,-50%);transform:translate(-50%,-50%);background:rgba(15,25,45,0.94);color:#fff;padding:24px 26px;border-radius:18px;text-align:center;z-index:10;width:88%;max-width:340px;max-height:88vh;overflow-y:auto;}
#otitle{font-size:22px;font-weight:700;margin-bottom:4px;}
#oresult{font-size:15px;opacity:0.9;margin-bottom:14px;line-height:1.5;}
#oresult b{font-size:18px;color:#ffd633;}
#leaderboard{margin-bottom:18px;text-align:left;}
#lb-title{font-size:14px;font-weight:700;text-align:center;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;color:#ffd633;}
.lb-row{display:flex;align-items:center;padding:7px 10px;margin-bottom:3px;background:rgba(255,255,255,0.06);border-radius:8px;font-size:13px;}
.lb-row.me{background:rgba(255,214,51,0.18);border:1px solid rgba(255,214,51,0.4);}
.lb-rank{width:26px;font-weight:700;color:#aaa;}
.lb-rank.gold{color:#ffd633;}
.lb-rank.silver{color:#c0c0c0;}
.lb-rank.bronze{color:#cd7f32;}
.lb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-score{font-weight:700;color:#fff;}
#lb-loading{text-align:center;padding:14px;font-size:13px;opacity:0.6;}
#rbtn{padding:13px 32px;border-radius:12px;border:none;background:linear-gradient(135deg,#ff3b3b,#ff6b6b);color:#fff;font-size:16px;font-weight:700;cursor:pointer;width:100%;}
#rbtn:active{-webkit-transform:scale(0.97);transform:scale(0.97);}
#start-hint{position:absolute;bottom:20%;left:0;right:0;text-align:center;color:#fff;font-size:16px;font-weight:600;text-shadow:0 2px 8px rgba(0,0,0,0.5);pointer-events:none;z-index:5;}
</style>
</head>

<div id="err"></div>
<div id="wrap">
  <canvas id="c"></canvas>

  <div id="overlay">
    <div id="otitle"></div>

      <div id="lb-title">🏆 Топ 10</div>

</div>
<script>
// Global error handler
window.onerror = function(msg, url, line, col, error){
  var e = document.getElementById('err');
  if(e){
    e.style.display = 'block';
    e.textContent = 'Ошибка: ' + msg + ' (строка ' + line + ')';
  }
  return false;
};

// Tell Telegram we're ready as early as possible
try {
  if(window.Telegram && window.Telegram.WebApp){
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
  }
} catch(e){}
// === Supabase config ===
var SUPABASE_URL = 'https://qoapctagglwskrfmmsdb.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvYXBjdGFnZ2x3c2tyZm1tc2RiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODY0MTAsImV4cCI6MjA5Mjk2MjQxMH0.YxFv2PLAUzXY7XFICMOJg5kHCoiR2FzhCK4H4JkjY1o';

// === Polyfills ===
if(typeof CanvasRenderingContext2D !== 'undefined' && !CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    if(typeof r === 'number') r = [r,r,r,r];
    if(!Array.isArray(r)) r = [0,0,0,0];
    while(r.length < 4) r.push(0);
    this.moveTo(x+r[0],y);
    this.lineTo(x+w-r[1],y);
    this.arcTo(x+w,y,x+w,y+r[1],r[1]);
    this.lineTo(x+w,y+h-r[2]);
    this.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
    this.lineTo(x+r[3],y+h);
    this.arcTo(x,y+h,x,y+h-r[3],r[3]);
    this.lineTo(x,y+r[0]);
    this.arcTo(x,y,x+r[0],y,r[0]);
    this.closePath();
    return this;
  };
}

// === Telegram ===
var tg = window.Telegram && window.Telegram.WebApp;
var tgUser = null;
if(tg){
  try { tg.ready(); } catch(e){}
  try { tg.expand(); } catch(e){}
  try { if(tg.disableVerticalSwipes) tg.disableVerticalSwipes(); } catch(e){}
  if(tg.initDataUnsafe && tg.initDataUnsafe.user){
    tgUser = tg.initDataUnsafe.user;
  }
}
// fallback for testing outside telegram
if(!tgUser){
  var guestId;
  try {
    guestId = parseInt(localStorage.getItem('guest_id') || '0', 10);
    if(!guestId){
      guestId = Math.floor(Math.random()*1e9);
      localStorage.setItem('guest_id', guestId+'');
    }

  }

    id: guestId,

function getDisplayName(){
  if(tgUser.username) return '@' + tgUser.username;
  return tgUser.first_name || 'Игрок';
}

// === Supabase API helpers ===
function saveScore(totalScore){
  return fetch(SUPABASE_URL + '/rest/v1/scores', {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({
      user_id: tgUser.id,
      username: tgUser.username || '',
      first_name: tgUser.first_name || '',
      score: totalScore
    })
  });
}

function fetchTop10(){
  return fetch(SUPABASE_URL + '/rest/v1/scores?select=user_id,username,first_name,score&order=score.desc&limit=100', {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    }
  }).then(function(r){
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  });
}

function renderLeaderboard(rows){
  var list = document.getElementById('lb-list');
  if(!rows || !rows.length){
    list.innerHTML = '<div id="lb-loading">Пока никто не играл</div>';
    return;
  }
  // Dedupe by user_id, keep highest score
  var seen = {};
  var unique = [];
  for(var i = 0; i < rows.length; i++){
    var r = rows[i];
    if(!seen[r.user_id]){
      seen[r.user_id] = true;
      unique.push(r);
    }
    if(unique.length >= 10) break;
  }
  var html = '';
  for(var j = 0; j < unique.length; j++){
    var u = unique[j];
    var name = u.username ? '@' + u.username : (u.first_name || 'Игрок');
    var rankCls = j === 0 ? 'gold' : j === 1 ? 'silver' : j === 2 ? 'bronze' : '';
    var meCls = (u.user_id === tgUser.id) ? ' me' : '';
    html += '<div class="lb-row' + meCls + '">' +
            '<div class="lb-rank ' + rankCls + '">' + (j+1) + '</div>' +
            '<div class="lb-name">' + escapeHtml(name) + '</div>' +
            '<div class="lb-score">' + u.score + '</div>' +
            '</div>';
  }
  list.innerHTML = html;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

// === Canvas setup ===
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var overlay = document.getElementById('overlay');
var otitle = document.getElementById('otitle');
var oresult = document.getElementById('oresult');
var rbtn = document.getElementById('rbtn');
var startHint = document.getElementById('start-hint');

var W, H, DPR;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// === Game constants ===
var BASE_SPEED = 1.4;
var SPEED_INC = 0.025;
var MAX_SPEED = 5.5;
var GRAVITY = 0.18;
var FLAP_FORCE = -5.0;
var HERO_W = 56, HERO_H = 56;
var PIPE_W = 56;
var GAP_MIN = 180;
var COIN_VALUE = 5;
var PIPE_VALUE = 1;

var SCENES = [
  { sky:['#87ceeb','#cfeefb'], cloud:'rgba(255,255,255,0.85)', star:0,   sun:'#ffd84a', sunY:0.18 },
  { sky:['#ff8a5b','#ffd1a8'], cloud:'rgba(255,200,180,0.7)',  star:0,   sun:'#ff5722', sunY:0.7 },
  { sky:['#0a1438','#2c3e6b'], cloud:'rgba(180,200,230,0.25)', star:1,   sun:'#e8e8f5', sunY:0.2 },
  { sky:['#6a4b8a','#f4a3a3'], cloud:'rgba(255,220,220,0.6)',  star:0.3, sun:'#ffb37a', sunY:0.65 }
];
var SCENE_DURATION = 8;

var plane, pipes, coins, score, coinsCollected, speed, alive, started, raf, particles;
var sceneIdx = 0, sceneProgress = 0;
var mouthOpenTime = 0;
var bgOffset = 0;
var resultSaved = false;
var now = Date.now;

function makeObstacle(x){
  var positions = [
    60 + Math.random() * 80,
    H * 0.3 + Math.random() * (H * 0.15),
    H * 0.5 + Math.random() * (H * 0.15)
  ];
  var topH = positions[Math.floor(Math.random() * 3)];
  var gap = GAP_MIN + Math.random() * 30;
  var top = Math.max(40, Math.min(H - gap - 80, topH));
  return { x:x, top:top, bot:top + gap, passed:false };
}

function makeCoin(afterPipe, nextPipe){
  var x = (afterPipe.x + PIPE_W + nextPipe.x) / 2;
  var y = 80 + Math.random() * (H - 200);
  return { x:x, y:y, collected:false, phase:Math.random() * Math.PI * 2 };
}

function pipeSpacing(){
  return Math.max(W * 0.65, 240);
}

function getTotalScore(){
  return score * PIPE_VALUE + coinsCollected * COIN_VALUE;
}

function startGame(){
  overlay.style.display = 'none';
  startHint.style.display = 'block';
  plane = { x:W*0.25, y:H/2, vy:0, angle:0, trail:[] };
  var sp = pipeSpacing();
  pipes = [makeObstacle(W + 60), makeObstacle(W + 60 + sp)];
  coins = [makeCoin(pipes[0], pipes[1])];
  score = 0;
  coinsCollected = 0;
  speed = BASE_SPEED;
  alive = true;
  started = false;
  particles = [];
  sceneIdx = 0;
  sceneProgress = 0;
  mouthOpenTime = 0;
  bgOffset = 0;
  resultSaved = false;
  if(raf) cancelAnimationFrame(raf);
  loop();
}

function flap(){
  if(!alive) return;
  if(!started){
    started = true;
    startHint.style.display = 'none';
  }
  plane.vy = FLAP_FORCE;
}

canvas.addEventListener('touchstart', function(e){ e.preventDefault(); flap(); }, false);
canvas.addEventListener('mousedown', function(e){ e.preventDefault(); flap(); }, false);
document.addEventListener('keydown', function(e){ if(e.code==='Space'||e.keyCode===32){ e.preventDefault(); flap(); }});
rbtn.addEventListener('click', function(e){ e.stopPropagation(); startGame(); });
rbtn.addEventListener('touchend', function(e){ e.stopPropagation(); e.preventDefault(); startGame(); }, false);

function haptic(type){
  try {
    if(tg && tg.HapticFeedback){
      if(type==='hit') tg.HapticFeedback.impactOccurred('heavy');
      else if(type==='coin') tg.HapticFeedback.impactOccurred('light');
    }
  } catch(e){}
}

function hexToRgb(hex){
  var n = parseInt(hex.slice(1), 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}

function lerpColor(a, b, t){
  var ca = hexToRgb(a), cb = hexToRgb(b);
  var r = Math.round(ca[0]+(cb[0]-ca[0])*t);
  var g = Math.round(ca[1]+(cb[1]-ca[1])*t);
  var bl = Math.round(ca[2]+(cb[2]-ca[2])*t);
  return 'rgb('+r+','+g+','+bl+')';
}

function getCurrentScene(){
  var cur = SCENES[sceneIdx];
  var next = SCENES[(sceneIdx + 1) % SCENES.length];
  var t = Math.min(1, Math.max(0, (sceneProgress - (SCENE_DURATION - 1.5)) / 1.5));
  return { cur:cur, next:next, t:t };
}

function drawCircle(cx, cy, r){
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
}

function drawSky(){
  var s = getCurrentScene();
  var sky0 = lerpColor(s.cur.sky[0], s.next.sky[0], s.t);
  var sky1 = lerpColor(s.cur.sky[1], s.next.sky[1], s.t);
  var grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, sky0);
  grad.addColorStop(1, sky1);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  var starAlpha = s.cur.star * (1 - s.t) + s.next.star * s.t;
  if(starAlpha > 0.05){
    ctx.fillStyle = 'rgba(255,255,255,' + starAlpha + ')';
    for(var i = 0; i < 40; i++){
      var sx = (i * 137.5 + bgOffset * 0.1) % W;
      var sy = (i * 73.3) % (H * 0.6);
      var r = ((i % 3) + 1) * 0.7;
      drawCircle(sx, sy, r);
      ctx.fill();
    }
  }

  var sunY = s.cur.sunY * (1 - s.t) + s.next.sunY * s.t;
  var sunCol = lerpColor(s.cur.sun, s.next.sun, s.t);
  ctx.fillStyle = sunCol;
  ctx.globalAlpha = 0.85;
  drawCircle(W * 0.78, H * sunY, 35);
  ctx.fill();
  ctx.globalAlpha = 0.2;
  drawCircle(W * 0.78, H * sunY, 55);
  ctx.fill();
  ctx.globalAlpha = 1;

  var clouds = [[0.10,0.12,50],[0.45,0.08,38],[0.72,0.22,60],[0.20,0.30,35],[0.85,0.15,42]];
  ctx.fillStyle = s.cur.cloud;
  for(var ci = 0; ci < clouds.length; ci++){
    var cl = clouds[ci];
    var px = ((W * cl[0] - bgOffset * 0.3) % (W + 200) + W + 200) % (W + 200) - 100;
    var py = H * cl[1];
    var cr = cl[2];
    ctx.beginPath();
    ctx.arc(px, py, cr, 0, Math.PI*2);
    ctx.arc(px + cr*0.6, py - cr*0.3, cr*0.7, 0, Math.PI*2);
    ctx.arc(px - cr*0.55, py - cr*0.18, cr*0.65, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  var buildings = [40,70,55,90,45,75,60,100,50,80,65];
  var bw = W / buildings.length;
  for(var bi = 0; bi < buildings.length; bi++){
    ctx.fillRect(bi * bw, H - buildings[bi], bw + 1, buildings[bi]);
  }
}

function drawSuperman(px, py, ang, alpha){
  ctx.save();
  ctx.globalAlpha = (alpha !== undefined) ? alpha : 1;
  ctx.translate(px, py);
  ctx.rotate(ang);

  var capeWave = alive ? Math.sin(now() / 80) * 4 : 0;

  // Cape
  ctx.fillStyle = '#cc0000';
  ctx.beginPath();
  ctx.moveTo(-8, -10);
  ctx.lineTo(-28, -14 + capeWave);
  ctx.lineTo(-32, 0);
  ctx.lineTo(-28, 14 - capeWave);
  ctx.lineTo(-8, 10);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#990000';
  ctx.beginPath();
  ctx.moveTo(-8, -8);
  ctx.lineTo(-22, -10 + capeWave * 0.7);
  ctx.lineTo(-22, 10 - capeWave * 0.7);
  ctx.lineTo(-8, 8);
  ctx.closePath();
  ctx.fill();

  // Body
  ctx.fillStyle = '#1e5fc8';
  drawCircle(0, 4, 13);
  ctx.fill();

  // Emblem
  ctx.fillStyle = '#ffe436';
  ctx.beginPath();
  ctx.moveTo(-5, -2);
  ctx.lineTo(5, -2);
  ctx.lineTo(4, 8);
  ctx.lineTo(0, 11);
  ctx.lineTo(-4, 8);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#cc0000';
  ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', 0, 4);

  // Arm
  ctx.fillStyle = '#1e5fc8';
  ctx.save();
  ctx.translate(14, -2);
  ctx.rotate(-0.2);
  ctx.scale(12, 4);
  ctx.beginPath();
  ctx.arc(0, 0, 1, 0, Math.PI*2);
  ctx.restore();
  ctx.fill();

  // Fist
  ctx.fillStyle = '#f4c5a0';
  drawCircle(24, -4, 4);
  ctx.fill();

  // Leg
  ctx.fillStyle = '#1e5fc8';
  ctx.save();
  ctx.translate(-12, 12);
  ctx.rotate(0.2);
  ctx.scale(10, 4);
  ctx.beginPath();
  ctx.arc(0, 0, 1, 0, Math.PI*2);
  ctx.restore();
  ctx.fill();

  // Boot
  ctx.fillStyle = '#cc0000';
  ctx.save();
  ctx.translate(-19, 14);
  ctx.rotate(0.3);
  ctx.scale(5, 3);
  ctx.beginPath();
  ctx.arc(0, 0, 1, 0, Math.PI*2);
  ctx.restore();
  ctx.fill();

  // Head
  ctx.fillStyle = '#f4c5a0';
  drawCircle(8, -8, 9);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.moveTo(2, -14);
  ctx.lineTo(14, -16);
  ctx.lineTo(12, -10);
  ctx.lineTo(2, -10);
  ctx.closePath();
  ctx.fill();
  drawCircle(11, -11, 1.5);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#1a1a1a';
  drawCircle(12, -8, 1.2);
  ctx.fill();

  // Mouth
  var mouthOpen = (now() - mouthOpenTime) < 400;
  if(mouthOpen){
    ctx.fillStyle = '#3a1a1a';
    ctx.save();
    ctx.translate(13, -4);
    ctx.scale(2.5, 2);
    ctx.beginPath();
    ctx.arc(0, 0, 1, 0, Math.PI*2);
    ctx.restore();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(11.5, -5, 3, 0.8);
  } else {
    ctx.strokeStyle = '#5a3020';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(11, -4);
    ctx.lineTo(15, -4);
    ctx.stroke();
  }

  ctx.restore();
}

function drawObstacle(p){
  var grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  grad.addColorStop(0, '#3a4a5e');
  grad.addColorStop(0.5, '#5a6a7e');
  grad.addColorStop(1, '#2a3a4e');
  ctx.fillStyle = grad;
  ctx.fillRect(p.x, 0, PIPE_W, p.top);
  ctx.fillRect(p.x, p.bot, PIPE_W, H - p.bot);
  ctx.fillStyle = '#6a7a8e';
  ctx.fillRect(p.x - 4, p.top - 18, PIPE_W + 8, 18);
  ctx.fillRect(p.x - 4, p.bot, PIPE_W + 8, 18);
  ctx.fillStyle = 'rgba(255,230,150,0.55)';
  for(var y = 20; y < p.top - 25; y += 24){
    ctx.fillRect(p.x + 8, y, 12, 10);
    ctx.fillRect(p.x + 30, y, 12, 10);
  }
  for(var y2 = p.bot + 25; y2 < H - 10; y2 += 24){
    ctx.fillRect(p.x + 8, y2, 12, 10);
    ctx.fillRect(p.x + 30, y2, 12, 10);
  }
}

function drawCoin(c){
  if(c.collected) return;
  var wobble = alive ? Math.sin(c.phase + now() / 200) * 0.6 + 0.4 : 1;
  var r = 13;
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.scale(wobble, 1);
  var g = ctx.createRadialGradient(-3, -3, 1, 0, 0, r);
  g.addColorStop(0, '#fff5a8');
  g.addColorStop(0.5, '#ffd633');
  g.addColorStop(1, '#cc8a00');
  ctx.fillStyle = g;
  drawCircle(0, 0, r);
  ctx.fill();
  ctx.strokeStyle = '#a86b00';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  if(wobble > 0.5){
    ctx.fillStyle = '#a86b00';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', 0, 1);
  }
  ctx.restore();
  ctx.fillStyle = 'rgba(255,220,100,0.18)';
  drawCircle(c.x, c.y, r + 6);
  ctx.fill();
}

function spawnCrashParticles(px, py){
  var cols = ['#1e5fc8','#cc0000','#ffe436','#f4c5a0'];
  for(var i = 0; i < 22; i++){
    var a = Math.random() * Math.PI * 2;
    var s = 2 + Math.random() * 5;
    particles.push({
      x:px, y:py,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, size:4+Math.random()*4,
      col:cols[i%4], type:'crash'
    });
  }
}

function spawnCoinParticles(px, py){
  for(var i = 0; i < 10; i++){
    var a = Math.random() * Math.PI * 2;
    var s = 1 + Math.random() * 3;
    particles.push({
      x:px, y:py,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s - 1,
      life:1, size:3+Math.random()*2,
      col:'#ffd633', type:'coin'
    });
  }
}

function updateParticles(){
  var alive2 = [];
  for(var i = 0; i < particles.length; i++){
    var p = particles[i];
    if(p.life <= 0) continue;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += (p.type === 'coin') ? 0.08 : 0.18;
    p.life -= (p.type === 'coin') ? 0.04 : 0.025;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.col;
    if(p.type === 'coin'){
      drawCircle(p.x, p.y, p.size);
      ctx.fill();
    } else {
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.restore();
    if(p.life > 0) alive2.push(p);
  }
  particles = alive2;
}

function hitTest(){
  var hw = HERO_W * 0.32, hh = HERO_H * 0.32;
  if(plane.y - hh <= 0 || plane.y + hh >= H) return true;
  for(var i = 0; i < pipes.length; i++){
    var p = pipes[i];
    if(plane.x + hw > p.x + 4 && plane.x - hw < p.x + PIPE_W - 4){
      if(plane.y - hh < p.top || plane.y + hh > p.bot) return true;
    }
  }
  return false;
}

function checkCoins(){
  for(var i = 0; i < coins.length; i++){
    var c = coins[i];
    if(c.collected) continue;
    var dx = c.x - plane.x, dy = c.y - plane.y;
    if(dx*dx + dy*dy < 26*26){
      c.collected = true;
      coinsCollected++;
      mouthOpenTime = now();
      spawnCoinParticles(c.x, c.y);
      haptic('coin');
    }
  }
}

function showResultOverlay(){
  var total = getTotalScore();
  otitle.textContent = 'Супермен сбит!';
  oresult.innerHTML =
    'Препятствия: <b>' + score + '</b> (×' + PIPE_VALUE + ')<br>' +
    'Монеты: <b>' + coinsCollected + '</b> (×' + COIN_VALUE + ')<br>' +
    'Итого: <b>' + total + '</b>';
  document.getElementById('lb-list').innerHTML = '<div id="lb-loading">Загрузка...</div>';
  overlay.style.display = 'block';

  // Save and load top
  if(!resultSaved){
    resultSaved = true;
    var savePromise = total > 0 ? saveScore(total) : Promise.resolve();
    savePromise.then(function(){
      return fetchTop10();
    }).then(function(rows){
      renderLeaderboard(rows);
    }).catch(function(err){
      document.getElementById('lb-list').innerHTML =
        '<div id="lb-loading">Не удалось загрузить рейтинг</div>';
    });
  }
}

function drawHUD(){
  var total = getTotalScore();

  // Total score (top right)
  ctx.textAlign = 'right';
  ctx.font = '700 32px sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillText(total, W - 18, 46);
  ctx.fillStyle = '#fff';
  ctx.fillText(total, W - 20, 44);

  // Coin counter (top left)
  ctx.textAlign = 'left';
  var cx2 = 30, cy2 = 36;
  var g = ctx.createRadialGradient(cx2-2, cy2-2, 1, cx2, cy2, 11);
  g.addColorStop(0, '#fff5a8');
  g.addColorStop(0.6, '#ffd633');
  g.addColorStop(1, '#cc8a00');
  ctx.fillStyle = g;
  drawCircle(cx2, cy2, 11);
  ctx.fill();
  ctx.fillStyle = '#a86b00';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('$', cx2, cy2 + 1);
  ctx.textAlign = 'left';
  ctx.font = '700 22px sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillText('\u00d7' + coinsCollected, 47, 43);
  ctx.fillStyle = '#fff';
  ctx.fillText('\u00d7' + coinsCollected, 46, 42);
}

function loop(){
  ctx.clearRect(0, 0, W, H);

  // If alive — update background offset
  if(alive && started) bgOffset += speed * 0.5;

  drawSky();

  // Pre-game state
  if(!started){
    for(var i = 0; i < pipes.length; i++) drawObstacle(pipes[i]);
    for(var i2 = 0; i2 < coins.length; i2++) drawCoin(coins[i2]);
    drawSuperman(plane.x, plane.y, 0);
    drawHUD();
    raf = requestAnimationFrame(loop);
    return;
  }

  // === When alive, do full update ===
  if(alive){
    plane.vy += GRAVITY;
    plane.y += plane.vy;
    plane.angle = Math.max(-0.5, Math.min(0.9, plane.vy * 0.06));

    plane.trail.push({ x:plane.x - 22, y:plane.y + 2 });
    if(plane.trail.length > 14) plane.trail.shift();

    for(var pi = 0; pi < pipes.length; pi++){
      var p = pipes[pi];
      p.x -= speed;
      if(!p.passed && p.x + PIPE_W < plane.x){
        p.passed = true;
        score++;
        sceneProgress++;
        speed = Math.min(MAX_SPEED, BASE_SPEED + Math.pow(score, 0.7) * SPEED_INC);
        if(sceneProgress >= SCENE_DURATION){
          sceneIdx = (sceneIdx + 1) % SCENES.length;
          sceneProgress = 0;
        }
      }
    }

    if(pipes[0].x + PIPE_W < -30){
      pipes.shift();
      var newPipe = makeObstacle(pipes[pipes.length-1].x + pipeSpacing());
      pipes.push(newPipe);
      coins.push(makeCoin(pipes[pipes.length-2], newPipe));
    }

    for(var ci = 0; ci < coins.length; ci++){
      coins[ci].x -= speed;
    }
    var newCoins = [];
    for(var ci2 = 0; ci2 < coins.length; ci2++){
      var cc = coins[ci2];
      if(cc.x > -30 && !(cc.collected && now() - mouthOpenTime > 500)){
        newCoins.push(cc);
      }
    }
    coins = newCoins;

    checkCoins();

    if(hitTest()){
      alive = false;
      spawnCrashParticles(plane.x, plane.y);
      haptic('hit');
      setTimeout(showResultOverlay, 800);
    }
  }

  // === Draw everything (frozen if dead) ===

  // Trail
  for(var ti = 0; ti < plane.trail.length; ti++){
    var tr = plane.trail[ti];
    ctx.save();
    ctx.globalAlpha = (ti / plane.trail.length) * 0.22;
    ctx.fillStyle = '#fff';
    ctx.translate(tr.x, tr.y);
    ctx.scale(6, 2.5);
    ctx.beginPath();
    ctx.arc(0, 0, 1, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  for(var pi2 = 0; pi2 < pipes.length; pi2++) drawObstacle(pipes[pi2]);
  for(var ci3 = 0; ci3 < coins.length; ci3++) drawCoin(coins[ci3]);

  if(!alive){
    updateParticles();
    drawSuperman(plane.x, plane.y, plane.angle + 0.7, 0.5);
  } else {
    drawSuperman(plane.x, plane.y, plane.angle);
  }

  drawHUD();
  raf = requestAnimationFrame(loop);
}

startGame();
</script>
