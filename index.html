<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Супермен</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
canvas{display:block;touch-action:none;}
#overlay{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(15,25,45,0.88);backdrop-filter:blur(10px);color:#fff;padding:28px 32px;border-radius:18px;text-align:center;z-index:10;min-width:240px;box-shadow:0 10px 40px rgba(0,0,0,0.5);}
#otitle{font-size:24px;font-weight:700;margin-bottom:6px;}
#osub{font-size:15px;opacity:0.85;margin-bottom:20px;line-height:1.4;}
#rbtn{padding:13px 32px;border-radius:12px;border:none;background:linear-gradient(135deg,#ff3b3b,#ff6b6b);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(255,59,59,0.4);}
#rbtn:active{transform:scale(0.97);}
#start-hint{position:absolute;bottom:20%;left:0;right:0;text-align:center;color:#fff;font-size:16px;font-weight:600;text-shadow:0 2px 8px rgba(0,0,0,0.5);pointer-events:none;z-index:5;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.7;}50%{opacity:1;}}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="start-hint">Нажми, чтобы взлететь</div>
  <div id="overlay">
    <div id="otitle"></div>
    <div id="osub"></div>
    <button id="rbtn">Начать заново</button>
  </div>
</div>
<script>
// Telegram Web App init
const tg = window.Telegram?.WebApp;
if(tg){
  tg.ready();
  tg.expand();
  try { tg.disableVerticalSwipes && tg.disableVerticalSwipes(); } catch(e){}
}

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const otitle = document.getElementById('otitle');
const osub = document.getElementById('osub');
const rbtn = document.getElementById('rbtn');
const startHint = document.getElementById('start-hint');

let W, H, DPR;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));

// === Game constants ===
const BASE_SPEED = 1.4;
const SPEED_INC = 0.025;
const MAX_SPEED = 5.5;
const GRAVITY = 0.18;
const FLAP = -5.0;
const HERO_W = 56, HERO_H = 56;

// Pipe/obstacle config
const PIPE_W = 56;
const GAP_MIN = 180;

// Backgrounds — cycle: day → sunset → night → dawn → day...
const SCENES = [
  { name: 'day',    sky: ['#87ceeb','#cfeefb'], cloud: 'rgba(255,255,255,0.85)', star: 0,    sun: '#ffd84a',     sunY: 0.18 },
  { name: 'sunset', sky: ['#ff8a5b','#ffd1a8'], cloud: 'rgba(255,200,180,0.7)',  star: 0,    sun: '#ff5722',     sunY: 0.7 },
  { name: 'night',  sky: ['#0a1438','#2c3e6b'], cloud: 'rgba(180,200,230,0.25)', star: 1,    sun: '#e8e8f5',     sunY: 0.2 },
  { name: 'dawn',   sky: ['#6a4b8a','#f4a3a3'], cloud: 'rgba(255,220,220,0.6)',  star: 0.3,  sun: '#ffb37a',     sunY: 0.65 }
];
const SCENE_DURATION = 8; // pipes per scene

let plane, pipes, coins, score, coinsCollected, speed, alive, started, raf, particles;
let sceneIdx = 0, sceneProgress = 0; // for smooth transitions
let mouthOpenTime = 0;
let bgOffset = 0;

// === Game objects ===
function makeObstacle(x){
  // Three vertical positions: top, middle, bottom
  const variants = [
    { topH: 60 + Math.random() * 80, gap: GAP_MIN + Math.random() * 30 },          // gap высоко
    { topH: H * 0.3 + Math.random() * (H * 0.15), gap: GAP_MIN + Math.random() * 30 }, // gap посередине
    { topH: H * 0.5 + Math.random() * (H * 0.15), gap: GAP_MIN + Math.random() * 30 }  // gap внизу
  ];
  const v = variants[Math.floor(Math.random() * variants.length)];
  const top = Math.max(40, Math.min(H - v.gap - 80, v.topH));
  return { x, top, bot: top + v.gap, passed: false };
}

function makeCoin(afterPipe, nextPipe){
  // Place coin in the gap between two pipes, at random height
  const x = (afterPipe.x + PIPE_W + nextPipe.x) / 2;
  const y = 80 + Math.random() * (H - 200);
  return { x, y, collected: false, phase: Math.random() * Math.PI * 2 };
}

function pipeSpacing(){
  return Math.max(W * 0.65, 240);
}

function startGame(){
  overlay.style.display = 'none';
  startHint.style.display = 'block';
  plane = { x: W * 0.25, y: H / 2, vy: 0, angle: 0, trail: [] };
  const sp = pipeSpacing();
  pipes = [makeObstacle(W + 60), makeObstacle(W + 60 + sp)];
  coins = [makeCoin(pipes[0], pipes[1])];
  score = 0;
  coinsCollected = 0;
  speed = BASE_SPEED;
  alive = true;
  started = false;
  particles = [];
  sceneIdx = 0;
  sceneProgress = 0;
  mouthOpenTime = 0;
  bgOffset = 0;
  cancelAnimationFrame(raf);
  loop();
}

function flap(){
  if(!alive) return;
  if(!started){
    started = true;
    startHint.style.display = 'none';
  }
  plane.vy = FLAP;
}

// Input
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, {passive:false});
canvas.addEventListener('mousedown', e => { e.preventDefault(); flap(); });
document.addEventListener('keydown', e => { if(e.code==='Space'){ e.preventDefault(); flap(); }});
rbtn.addEventListener('click', e => { e.stopPropagation(); startGame(); });
rbtn.addEventListener('touchstart', e => { e.stopPropagation(); e.preventDefault(); startGame(); }, {passive:false});

// Haptic feedback for Telegram
function haptic(type){
  try {
    if(tg?.HapticFeedback){
      if(type === 'hit') tg.HapticFeedback.impactOccurred('heavy');
      else if(type === 'coin') tg.HapticFeedback.impactOccurred('light');
    }
  } catch(e){}
}

// === Drawing helpers ===
function lerpColor(a, b, t){
  const pa = parseInt(a.slice(1), 16);
  const pb = parseInt(b.slice(1), 16);
  const ra = (pa>>16)&255, ga = (pa>>8)&255, ba = pa&255;
  const rb = (pb>>16)&255, gb = (pb>>8)&255, bb = pb&255;
  const r = Math.round(ra + (rb-ra)*t);
  const g = Math.round(ga + (gb-ga)*t);
  const bl = Math.round(ba + (bb-ba)*t);
  return `rgb(${r},${g},${bl})`;
}

function getCurrentScene(){
  const cur = SCENES[sceneIdx];
  const next = SCENES[(sceneIdx + 1) % SCENES.length];
  const t = Math.min(1, Math.max(0, (sceneProgress - (SCENE_DURATION - 1.5)) / 1.5));
  return { cur, next, t };
}

function drawSky(){
  const { cur, next, t } = getCurrentScene();
  const sky0 = lerpColor(cur.sky[0], next.sky[0], t);
  const sky1 = lerpColor(cur.sky[1], next.sky[1], t);
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, sky0);
  grad.addColorStop(1, sky1);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars (visible at night)
  const starAlpha = cur.star * (1 - t) + next.star * t;
  if(starAlpha > 0.05){
    ctx.fillStyle = `rgba(255,255,255,${starAlpha})`;
    for(let i = 0; i < 40; i++){
      const sx = (i * 137.5 + bgOffset * 0.1) % W;
      const sy = ((i * 73.3) % (H * 0.6));
      const r = ((i % 3) + 1) * 0.7;
      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Sun/moon
  const sunY = cur.sunY * (1 - t) + next.sunY * t;
  const sunCol = lerpColor(cur.sun, next.sun, t);
  ctx.fillStyle = sunCol;
  ctx.globalAlpha = 0.85;
  ctx.beginPath();
  ctx.arc(W * 0.78, H * sunY, 35, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 0.2;
  ctx.beginPath();
  ctx.arc(W * 0.78, H * sunY, 55, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Clouds (parallax)
  const cloudCol = cur.cloud; // simple — keep current cloud color
  const clouds = [
    [0.10, 0.12, 50],
    [0.45, 0.08, 38],
    [0.72, 0.22, 60],
    [0.20, 0.30, 35],
    [0.85, 0.15, 42]
  ];
  ctx.fillStyle = cloudCol;
  clouds.forEach(([rx, ry, r], i) => {
    const px = ((W * rx - bgOffset * 0.3) % (W + 200) + W + 200) % (W + 200) - 100;
    const py = H * ry;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI*2);
    ctx.arc(px + r*0.6, py - r*0.3, r*0.7, 0, Math.PI*2);
    ctx.arc(px - r*0.55, py - r*0.18, r*0.65, 0, Math.PI*2);
    ctx.fill();
  });

  // City silhouette at bottom (subtle)
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  const buildings = [40, 70, 55, 90, 45, 75, 60, 100, 50, 80, 65];
  const bw = W / buildings.length;
  buildings.forEach((bh, i) => {
    ctx.fillRect(i * bw, H - bh, bw + 1, bh);
  });
}

function drawSuperman(px, py, ang, alpha){
  ctx.save();
  ctx.globalAlpha = alpha !== undefined ? alpha : 1;
  ctx.translate(px, py);
  ctx.rotate(ang);

  // Cape (waving behind)
  const capeWave = Math.sin(Date.now() / 80) * 4;
  ctx.fillStyle = '#cc0000';
  ctx.beginPath();
  ctx.moveTo(-8, -10);
  ctx.lineTo(-28, -14 + capeWave);
  ctx.lineTo(-32, 0);
  ctx.lineTo(-28, 14 - capeWave);
  ctx.lineTo(-8, 10);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#990000';
  ctx.beginPath();
  ctx.moveTo(-8, -8);
  ctx.lineTo(-22, -10 + capeWave * 0.7);
  ctx.lineTo(-22, 10 - capeWave * 0.7);
  ctx.lineTo(-8, 8);
  ctx.closePath();
  ctx.fill();

  // Body (torso) - blue suit
  ctx.fillStyle = '#1e5fc8';
  ctx.beginPath();
  ctx.ellipse(0, 4, 14, 12, 0, 0, Math.PI*2);
  ctx.fill();

  // Chest emblem (yellow shield with S)
  ctx.fillStyle = '#ffe436';
  ctx.beginPath();
  ctx.moveTo(-5, -2);
  ctx.lineTo(5, -2);
  ctx.lineTo(4, 8);
  ctx.lineTo(0, 11);
  ctx.lineTo(-4, 8);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#cc0000';
  ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', 0, 4);

  // Arms — extended forward (flying pose)
  ctx.fillStyle = '#1e5fc8';
  ctx.beginPath();
  ctx.ellipse(14, -2, 12, 4, -0.2, 0, Math.PI*2);
  ctx.fill();
  // Fist (skin colored)
  ctx.fillStyle = '#f4c5a0';
  ctx.beginPath();
  ctx.arc(24, -4, 4, 0, Math.PI*2);
  ctx.fill();

  // Legs trailing back
  ctx.fillStyle = '#1e5fc8';
  ctx.beginPath();
  ctx.ellipse(-12, 12, 10, 4, 0.2, 0, Math.PI*2);
  ctx.fill();
  // Red boots
  ctx.fillStyle = '#cc0000';
  ctx.beginPath();
  ctx.ellipse(-19, 14, 5, 3, 0.3, 0, Math.PI*2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#f4c5a0';
  ctx.beginPath();
  ctx.arc(8, -8, 9, 0, Math.PI*2);
  ctx.fill();

  // Hair (black, swept back)
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.moveTo(2, -14);
  ctx.lineTo(14, -16);
  ctx.lineTo(12, -10);
  ctx.lineTo(2, -10);
  ctx.closePath();
  ctx.fill();
  // Hair curl
  ctx.beginPath();
  ctx.arc(11, -11, 1.5, 0, Math.PI*2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(12, -8, 1.2, 0, Math.PI*2);
  ctx.fill();

  // Mouth — open or closed
  const mouthOpen = (Date.now() - mouthOpenTime) < 400;
  if(mouthOpen){
    ctx.fillStyle = '#3a1a1a';
    ctx.beginPath();
    ctx.ellipse(13, -4, 2.5, 2, 0, 0, Math.PI*2);
    ctx.fill();
    // Teeth
    ctx.fillStyle = '#fff';
    ctx.fillRect(11.5, -5, 3, 0.8);
  } else {
    ctx.strokeStyle = '#5a3020';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(11, -4);
    ctx.lineTo(15, -4);
    ctx.stroke();
  }

  ctx.restore();
}

function drawObstacle(p){
  // Modern building-like obstacle
  const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  grad.addColorStop(0, '#3a4a5e');
  grad.addColorStop(0.5, '#5a6a7e');
  grad.addColorStop(1, '#2a3a4e');

  ctx.fillStyle = grad;
  // Top
  ctx.fillRect(p.x, 0, PIPE_W, p.top);
  // Bottom
  ctx.fillRect(p.x, p.bot, PIPE_W, H - p.bot);

  // Caps
  ctx.fillStyle = '#6a7a8e';
  ctx.fillRect(p.x - 4, p.top - 18, PIPE_W + 8, 18);
  ctx.fillRect(p.x - 4, p.bot, PIPE_W + 8, 18);

  // Window highlights
  ctx.fillStyle = 'rgba(255,230,150,0.55)';
  for(let y = 20; y < p.top - 25; y += 24){
    ctx.fillRect(p.x + 8, y, 12, 10);
    ctx.fillRect(p.x + 30, y, 12, 10);
  }
  for(let y = p.bot + 25; y < H - 10; y += 24){
    ctx.fillRect(p.x + 8, y, 12, 10);
    ctx.fillRect(p.x + 30, y, 12, 10);
  }
}

function drawCoin(c){
  if(c.collected) return;
  const wobble = Math.sin(c.phase + Date.now() / 200) * 0.6 + 0.4;
  const r = 13;
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.scale(wobble, 1);
  // outer
  const g = ctx.createRadialGradient(-3, -3, 1, 0, 0, r);
  g.addColorStop(0, '#fff5a8');
  g.addColorStop(0.5, '#ffd633');
  g.addColorStop(1, '#cc8a00');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#a86b00';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  // $ sign
  if(wobble > 0.5){
    ctx.fillStyle = '#a86b00';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', 0, 1);
  }
  ctx.restore();
  // glow
  ctx.fillStyle = 'rgba(255,220,100,0.18)';
  ctx.beginPath();
  ctx.arc(c.x, c.y, r + 6, 0, Math.PI*2);
  ctx.fill();
}

function spawnCrashParticles(px, py){
  for(let i = 0; i < 22; i++){
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 5;
    const cols = ['#1e5fc8', '#cc0000', '#ffe436', '#f4c5a0'];
    particles.push({
      x: px, y: py,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: 1, size: 4 + Math.random() * 4,
      col: cols[i % cols.length], type: 'crash'
    });
  }
}

function spawnCoinParticles(px, py){
  for(let i = 0; i < 10; i++){
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 3;
    particles.push({
      x: px, y: py,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 1,
      life: 1, size: 3 + Math.random() * 2,
      col: '#ffd633', type: 'coin'
    });
  }
}

function updateParticles(){
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.type === 'coin' ? 0.08 : 0.18;
    p.life -= p.type === 'coin' ? 0.04 : 0.025;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.col;
    ctx.beginPath();
    if(p.type === 'coin'){
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    } else {
      ctx.rect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.fill();
    ctx.restore();
  });
}

function hitTest(){
  const hw = HERO_W * 0.32, hh = HERO_H * 0.32;
  if(plane.y - hh <= 0 || plane.y + hh >= H) return true;
  for(const p of pipes){
    if(plane.x + hw > p.x + 4 && plane.x - hw < p.x + PIPE_W - 4){
      if(plane.y - hh < p.top || plane.y + hh > p.bot) return true;
    }
  }
  return false;
}

function checkCoins(){
  for(const c of coins){
    if(c.collected) continue;
    const dx = c.x - plane.x, dy = c.y - plane.y;
    if(dx*dx + dy*dy < 26*26){
      c.collected = true;
      coinsCollected++;
      mouthOpenTime = Date.now();
      spawnCoinParticles(c.x, c.y);
      haptic('coin');
    }
  }
}

function showOverlay(title, sub){
  otitle.textContent = title;
  osub.innerHTML = sub;
  overlay.style.display = 'block';
}

function drawHUD(){
  // Score (top right)
  ctx.textAlign = 'right';
  ctx.font = '700 32px sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillText(score, W - 18, 46);
  ctx.fillStyle = '#fff';
  ctx.fillText(score, W - 20, 44);

  // Coins (top left)
  ctx.textAlign = 'left';
  ctx.font = '700 22px sans-serif';
  // mini coin
  const cx = 30, cy = 36;
  const g = ctx.createRadialGradient(cx-2, cy-2, 1, cx, cy, 11);
  g.addColorStop(0, '#fff5a8');
  g.addColorStop(0.6, '#ffd633');
  g.addColorStop(1, '#cc8a00');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(cx, cy, 11, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#a86b00';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('$', cx, cy + 1);
  // count
  ctx.textAlign = 'left';
  ctx.font = '700 22px sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillText('×' + coinsCollected, 47, 43);
  ctx.fillStyle = '#fff';
  ctx.fillText('×' + coinsCollected, 46, 42);
}

// === Main loop ===
function loop(){
  ctx.clearRect(0, 0, W, H);
  bgOffset += speed * 0.5;
  drawSky();

  if(!started){
    pipes.forEach(drawObstacle);
    coins.forEach(drawCoin);
    drawSuperman(plane.x, plane.y, 0);
    drawHUD();
    raf = requestAnimationFrame(loop);
    return;
  }

  // Physics
  plane.vy += GRAVITY;
  plane.y += plane.vy;
  plane.angle = Math.max(-0.5, Math.min(0.9, plane.vy * 0.06));

  // Trail
  plane.trail.push({ x: plane.x - 22, y: plane.y + 2 });
  if(plane.trail.length > 14) plane.trail.shift();
  plane.trail.forEach((t, i) => {
    ctx.save();
    ctx.globalAlpha = (i / plane.trail.length) * 0.22;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(t.x, t.y, 6, 2.5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Update pipes
  pipes.forEach(p => {
    p.x -= speed;
    drawObstacle(p);
    if(!p.passed && p.x + PIPE_W < plane.x){
      p.passed = true;
      score++;
      sceneProgress++;
      // Smooth speed increase, capped
      speed = Math.min(MAX_SPEED, BASE_SPEED + Math.pow(score, 0.7) * SPEED_INC);
      // Scene change
      if(sceneProgress >= SCENE_DURATION){
        sceneIdx = (sceneIdx + 1) % SCENES.length;
        sceneProgress = 0;
      }
    }
  });

  // Recycle
  if(pipes[0].x + PIPE_W < -30){
    pipes.shift();
    const newPipe = makeObstacle(pipes[pipes.length-1].x + pipeSpacing());
    pipes.push(newPipe);
    coins.push(makeCoin(pipes[pipes.length-2], newPipe));
  }

  // Update coins
  coins.forEach(c => { c.x -= speed; });
  coins = coins.filter(c => c.x > -30 && !(c.collected && Date.now() - mouthOpenTime > 500));
  coins.forEach(drawCoin);

  // Coin collection
  if(alive) checkCoins();

  // Collision
  if(alive && hitTest()){
    alive = false;
    spawnCrashParticles(plane.x, plane.y);
    haptic('hit');
    const m = score < 3 ? 'Попробуй ещё раз!' :
              score < 10 ? 'Неплохо!' :
              score < 20 ? 'Отличный результат!' : 'Легенда!';
    setTimeout(() => showOverlay(
      'Супермен сбит!',
      `Очки: <b>${score}</b><br>Монет: <b>${coinsCollected}</b><br>${m}`
    ), 700);
  }

  // Draw hero
  if(!alive){
    updateParticles();
    drawSuperman(plane.x, plane.y, plane.angle + 0.7, 0.4);
  } else {
    drawSuperman(plane.x, plane.y, plane.angle);
  }

  drawHUD();
  raf = requestAnimationFrame(loop);
}

startGame();
</script>
